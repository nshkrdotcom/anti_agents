<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AntiAgents</title>
  <desc id="desc">A hexagonal emblem with mirrored agent flows and a luminous central kernel.</desc>
  <defs>
